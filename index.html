<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Log Console</title>
    <style>
        body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .wrapper { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #252526; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 20px; color: #4fc1ff; }
        .controls { display: flex; gap: 12px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; background: #1e1e1e; border: 1px solid #3c3c3c; color: #fff; border-radius: 4px; font-size: 14px; }
        input:focus { border-color: #0e639c; outline: none; }
        button { padding: 0 24px; background: #0e639c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1177bb; }
        #log-container { background: #1a1a1a; border: 1px solid #2d2d2d; height: 70vh; overflow-y: auto; padding: 12px; border-radius: 6px; }
        .line { display: flex; padding: 4px 6px; border-bottom: 1px solid #222; font-size: 13px; line-height: 1.4; }
        .line:hover { background: #222; }
        .ts { color: #858585; width: 170px; flex-shrink: 0; user-select: none; }
        .msg { white-space: pre-wrap; word-break: break-all; }
        
        /* Fast Color Highlights for log severity categories */
        .lvl-error { color: #f48771; font-weight: bold; }
        .lvl-warn { color: #cca700; font-weight: bold; }
        .lvl-info { color: #9cdcfe; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Embedded Target Log Console</h1>
            <div id="status" style="color: #4ec9b0; font-size: 13px;">● Engine Connected</div>
        </header>
        
        <div class="controls">
            <input type="text" id="filter" placeholder="Search / Filter strings instantly (e.g. 'ERROR', 'Temp')..." oninput="debounceSearch()">
            <button onclick="refreshLogs()">Manual Reload</button>
        </div>

        <div id="log-container">System offline or awaiting telemetry stream injection...</div>
    </div>

    <script>
        let searchTimer;

        async function refreshLogs() {
            const queryToken = document.getElementById("filter").value;
            const container = document.getElementById("log-container");

            try {
                const response = await fetch(`/api/logs?search=${encodeURIComponent(queryToken)}`);
                const items = await response.json();

                if (items.length === 0) {
                    container.innerHTML = '<div style="color: #6a9955; padding: 8px;">No matching log entities inside buffer.</div>';
                    return;
                }

                container.innerHTML = items.map(item => {
                    let logClass = "lvl-info";
                    if (item.text.includes("[ERROR]")) logClass = "lvl-error";
                    else if (item.text.includes("[WARN]")) logClass = "lvl-warn";

                    return `
                        <div class="line">
                            <span class="ts">[${item.time}]</span>
                            <span class="msg ${logClass}">${escapeText(item.text)}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById("status").innerHTML = '<span style="color:#f48771;">● Link Down</span>';
            }
        }

        function escapeText(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            // 200ms debounce prevents hammering the local SQLite file while typing
            searchTimer = setTimeout(refreshLogs, 200);
        }

        // Poll the server for new logs every 1000ms
        setInterval(refreshLogs, 1000);
        window.onload = refreshLogs;
    </script>
</body>
</html>
